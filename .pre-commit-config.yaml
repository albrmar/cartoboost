repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.21
    hooks:
      - id: uv-lock

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --check
        language: system
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: uv run --locked --group dev ruff format --check python tests scripts
        language: system
        pass_filenames: false

      - id: ruff-check
        name: ruff check
        entry: uv run --locked --group dev ruff check python tests scripts
        language: system
        pass_filenames: false

      - id: ty-check
        name: ty check
        entry: uv run --locked --group dev ty check python tests scripts
        language: system
        pass_filenames: false
