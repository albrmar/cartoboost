name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build source distribution
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels:
    name: Wheels (${{ matrix.platform.name }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        platform:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"
          - name: linux-aarch64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2014"
          - name: macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: auto
          - name: macos-aarch64
            runner: macos-15
            target: aarch64-apple-darwin
            manylinux: auto
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: auto
          - name: windows-aarch64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            manylinux: auto
        exclude:
          - platform:
              name: windows-aarch64
              runner: windows-11-arm
              target: aarch64-pc-windows-msvc
              manylinux: auto
            python-version: "3.10"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ !startsWith(matrix.platform.name, 'linux-') }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: publish-wheels-${{ matrix.platform.target }}-${{ matrix.python-version }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: >-
            --release
            --locked
            --compatibility pypi
            --out dist
            --interpreter ${{ startsWith(matrix.platform.name, 'linux-') && format('python{0}', matrix.python-version) || 'python' }}

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.name }}-py${{ matrix.python-version }}
          path: dist/*.whl

  publish:
    name: Publish
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*"
          merge-multiple: true

      - name: Check distributions
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
