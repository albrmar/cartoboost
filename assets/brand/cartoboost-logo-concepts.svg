<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CartoBoost logo concepts">
  <defs>
    <linearGradient id="boost" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00A3E0"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0B1220" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="420" fill="#F8FAFC"/>

  <!-- Concept 1: Hex tile + boosted route -->
  <g transform="translate(70,72)">
    <rect x="0" y="0" width="300" height="276" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
    <g transform="translate(75,42)">
      <polygon points="75,0 140,38 140,112 75,150 10,112 10,38" fill="#E0F2FE" stroke="#075985" stroke-width="7"/>
      <polygon points="75,22 120,48 120,101 75,127 30,101 30,48" fill="none" stroke="#38BDF8" stroke-width="4" opacity=".8"/>
      <path d="M36 108 C58 84, 78 79, 96 62 C110 49, 119 39, 126 24" fill="none" stroke="url(#boost)" stroke-width="14" stroke-linecap="round"/>
      <path d="M106 25 L128 21 L125 43" fill="none" stroke="#7C3AED" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="36" cy="108" r="9" fill="#075985"/>
      <circle cx="96" cy="62" r="9" fill="#075985"/>
    </g>
    <text x="150" y="228" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#0F172A">CartoBoost</text>
    <text x="150" y="252" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#475569">hex route signal + lift</text>
  </g>

  <!-- Concept 2: Periodic/time wave + spatial cells -->
  <g transform="translate(450,72)">
    <rect x="0" y="0" width="300" height="276" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
    <g transform="translate(63,45)">
      <path d="M10 96 C36 42, 60 42, 86 96 S136 150, 162 96" fill="none" stroke="#0F172A" stroke-width="10" stroke-linecap="round"/>
      <path d="M10 96 C36 42, 60 42, 86 96 S136 150, 162 96" fill="none" stroke="url(#boost)" stroke-width="5" stroke-linecap="round"/>
      <circle cx="10" cy="96" r="11" fill="#00A3E0"/>
      <circle cx="86" cy="96" r="11" fill="#0F172A"/>
      <circle cx="162" cy="96" r="11" fill="#7C3AED"/>
      <g opacity=".95" stroke="#075985" stroke-width="4" fill="#E0F2FE">
        <polygon points="42,3 68,18 68,49 42,64 16,49 16,18"/>
        <polygon points="98,3 124,18 124,49 98,64 72,49 72,18"/>
      </g>
    </g>
    <text x="150" y="228" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#0F172A">CartoBoost</text>
    <text x="150" y="252" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#475569">time cycles + spatial structure</text>
  </g>

  <!-- Concept 3: C monogram route -->
  <g transform="translate(830,72)">
    <rect x="0" y="0" width="300" height="276" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
    <g transform="translate(72,38)">
      <path d="M136 42 C104 7, 38 18, 20 72 C2 126, 50 169, 101 154 C119 149, 133 139, 144 126" fill="none" stroke="#0F172A" stroke-width="23" stroke-linecap="round"/>
      <path d="M136 42 C104 7, 38 18, 20 72 C2 126, 50 169, 101 154 C119 149, 133 139, 144 126" fill="none" stroke="url(#boost)" stroke-width="12" stroke-linecap="round"/>
      <path d="M116 124 L146 124 L137 95" fill="none" stroke="#7C3AED" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="20" cy="72" r="9" fill="#00A3E0"/>
      <circle cx="86" cy="158" r="9" fill="#00A3E0"/>
      <circle cx="136" cy="42" r="9" fill="#7C3AED"/>
    </g>
    <text x="150" y="228" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#0F172A">CartoBoost</text>
    <text x="150" y="252" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#475569">monogram route booster</text>
  </g>
</svg>
